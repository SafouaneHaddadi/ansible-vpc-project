# Variables shared across the whole project
region: "us-east-1"
state: "present"
env: "dev"
project: "vprofile"

ansible_connection: amazon.aws.aws_ssm
ansible_aws_ssm_region: us-east-1
ansible_aws_ssm_bucket_name: vprofile-ansible-ssm-transfers
ansible_user: ubuntu
ansible_python_interpreter: /usr/bin/python3
ansible_remote_tmp: /tmp/ansible