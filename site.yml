---
- name: Fetch artifacts from S3
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - roles/stack_provision/vars/main.yml
  tasks:
    - ansible.builtin.import_tasks: roles/stack_provision/tasks/fetch_artifacts.yml

- name: Provision MySQL
  hosts: _mysql
  become: true
  gather_facts: true
  vars_files:
    - roles/stack_provision/vars/main.yml
  tasks:
    - ansible.builtin.import_tasks: roles/stack_provision/tasks/mysql.yml
  handlers:
    - ansible.builtin.import_tasks: roles/stack_provision/handlers/main.yml

- name: Provision Memcached
  hosts: _memcache
  become: true
  gather_facts: true
  tasks:
    - ansible.builtin.import_tasks: roles/stack_provision/tasks/memcache.yml
  handlers:
    - ansible.builtin.import_tasks: roles/stack_provision/handlers/main.yml

- name: Provision RabbitMQ
  hosts: _rabbitmq
  become: true
  gather_facts: true
  tasks:
    - ansible.builtin.import_tasks: roles/stack_provision/tasks/rabbitmq.yml
  handlers:
    - ansible.builtin.import_tasks: roles/stack_provision/handlers/main.yml
  