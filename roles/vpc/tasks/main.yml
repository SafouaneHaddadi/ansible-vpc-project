---
- name: Create VPC
  amazon.aws.ec2_vpc_net:
    name: "{{ vpc_name }}"
    cidr_block: "{{ vpc_cidr }}"
    region: "{{ region }}"
    state: "{{ state }}"
    dns_support: true
    dns_hostnames: true
    tenancy: default
    tags:
      Name: "{{ vpc_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: vpc_out

- name: Create Internet Gateway
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc_out.vpc.id }}"
    region: "{{ region }}"
    state: present
    tags:
      Name: "{{ vpc_name }}-igw"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: igw_out

- name: Debug Internet Gateway
  debug:
    msg: "Internet Gateway created: {{ igw_out.gateway_id }}"

- name: Create public subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc_out.vpc.id }}"
    cidr: "{{ item.cidr }}" #each item in the list of public_subnets
    az: "{{ item.az }}"
    region: "{{ region }}"
    map_public: true
    tags:
      Name: "{{ item.name }}"
      Type: public
  loop: "{{ public_subnets }}"
  register: pubsub_out

- name: Create private subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc_out.vpc.id }}"
    cidr: "{{ item.cidr }}"
    az: "{{ item.az }}"
    region: "{{ region }}"
    map_public: false
    tags:
      Name: "{{ item.name }}"
      Type: private
  loop: "{{ private_subnets }}"
  register: privsub_out

- name: Create public route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc_out.vpc.id }}"
    region: "{{ region }}"
    state: "{{ state }}"
    tags:
      Name: "{{ vpc_name }}-public-rt"
      Environment: "{{ env }}"
      ManagedBy: ansible
    subnets: "{{ pubsub_out.results | map(attribute='subnet.id') | list }}"
    routes:
      - dest: 0.0.0.0/0
        gateway_id: "{{ igw_out.gateway_id }}"
  register: public_rt_out

- name: Debug public route table
  debug:
    msg: "Public route table ID: {{ public_rt_out.route_table.id }}"

- name: Create NAT Gateway in public subnet
  amazon.aws.ec2_vpc_nat_gateway:
    subnet_id: "{{ pubsub_out.results[0].subnet.id }}" # using the first public subnet for NAT Gateway
    region: "{{ region }}"
    state: present
    wait: true
    if_exist_do_not_create: true
  register: nat_gateway_out

- name: Debug NAT Gateway (full output)
  debug:
    var: nat_gateway_out