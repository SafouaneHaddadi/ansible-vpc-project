---
- name: Fetch VPC and subnet IDs from SSM
  set_fact:
    vpc_id: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/vpc/id', region='us-east-1') }}"
    public_subnet_ids: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/subnets/public', region='us-east-1').split(',') }}"
    private_subnet_ids: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/subnets/private', region='us-east-1').split(',') }}"

- name: Debug fetched IDs
  debug:
    msg:
      - "VPC ID: {{ vpc_id }}"
      - "Public subnet IDs: {{ public_subnet_ids }}"
      - "Private subnet IDs: {{ private_subnet_ids }}"

# LOAD BALANCER SECURITY GROUP 
- name: Create Load Balancer security group
  amazon.aws.ec2_security_group:
    name: "{{ alb_sg_name }}"
    description: "ALB security group - HTTP/HTTPS from internet"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    rules:
      - proto: tcp
        from_port: 80 # the ALB can receive web traffic from the internet
        to_port: 80
        cidr_ip: "0.0.0.0/0"
        rule_desc: "HTTP from anywhere"
      - proto: tcp
        from_port: 443
        to_port: 443
        cidr_ip: "0.0.0.0/0"
        rule_desc: "HTTPS from anywhere"
    rules_egress:
      - proto: all
        cidr_ip: "0.0.0.0/0"
        rule_desc: "Allow all outbound"
    tags:
      Name: "{{ alb_sg_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: alb_sg

# NGINX SECURITY GROUP
- name: Create Nginx security group
  amazon.aws.ec2_security_group:
    name: "{{ nginx_sg_name }}"
    description: "Nginx SG - HTTP only from ALB"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    rules:
      - proto: tcp
        from_port: "{{ nginx_port }}"
        to_port: "{{ nginx_port }}"
        group_id: "{{ alb_sg.group_id }}"
        rule_desc: "HTTP from ALB only"
    rules_egress:
      - proto: all
        cidr_ip: "0.0.0.0/0"
        rule_desc: "Allow all outbound"
    tags:
      Name: "{{ nginx_sg_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: nginx_sg

# TOMCAT SECURITY GROUP 
- name: Create Tomcat security group
  amazon.aws.ec2_security_group:
    name: "{{ tomcat_sg_name }}"
    description: "Tomcat SG - port 8080 from Nginx only"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    rules:
      - proto: tcp
        from_port: "{{ tomcat_port }}"
        to_port: "{{ tomcat_port }}"
        group_id: "{{ nginx_sg.group_id }}"
        rule_desc: "App traffic from Nginx only"
    rules_egress:
      - proto: all
        cidr_ip: "0.0.0.0/0"
        rule_desc: "Allow all outbound"
    tags:
      Name: "{{ tomcat_sg_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: tomcat_sg

- name: Debug Tomcat security group ID
  debug:
    msg: "Tomcat SG created: {{ tomcat_sg.group_id }}"

# MYSQL SECURITY GROUP 
- name: Create MySQL security group
  amazon.aws.ec2_security_group:
    name: "{{ mysql_sg_name }}"
    description: "MySQL SG - port 3306 from Tomcat only"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    rules:
      - proto: tcp
        from_port: "{{ mysql_port }}"
        to_port: "{{ mysql_port }}"
        group_id: "{{ tomcat_sg.group_id }}"
        rule_desc: "MySQL access from Tomcat only"
    rules_egress:
      - proto: all
        cidr_ip: "0.0.0.0/0"
        rule_desc: "Allow all outbound"
    tags:
      Name: "{{ mysql_sg_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: mysql_sg

- name: Debug MySQL security group ID
  debug:
    msg: "MySQL SG created: {{ mysql_sg.group_id }}"

# MEMCACHED SECURITY GROUP 
- name: Create Memcached security group
  amazon.aws.ec2_security_group:
    name: "{{ memcache_sg_name }}"
    description: "Memcached SG - port 11211 from Tomcat only"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    rules:
      - proto: tcp
        from_port: "{{ memcache_port }}"
        to_port: "{{ memcache_port }}"
        group_id: "{{ tomcat_sg.group_id }}"
        rule_desc: "Memcached access from Tomcat only"
    rules_egress:
      - proto: all
        cidr_ip: "0.0.0.0/0"
        rule_desc: "Allow all outbound"
    tags:
      Name: "{{ memcache_sg_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: memcache_sg

- name: Debug Memcached security group ID
  debug:
    msg: "Memcached SG created: {{ memcache_sg.group_id }}"

# RABBITMQ SECURITY GROUP 
- name: Create RabbitMQ security group
  amazon.aws.ec2_security_group:
    name: "{{ rabbitmq_sg_name }}"
    description: "RabbitMQ SG - ports 5672 and 15672 from Tomcat only"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    rules:
      - proto: tcp
        from_port: "{{ rabbitmq_port }}"
        to_port: "{{ rabbitmq_port }}"
        group_id: "{{ tomcat_sg.group_id }}"
        rule_desc: "AMQP from Tomcat only"
      - proto: tcp
        from_port: "{{ rabbitmq_mgmt_port }}"
        to_port: "{{ rabbitmq_mgmt_port }}"
        group_id: "{{ tomcat_sg.group_id }}"
        rule_desc: "Management UI from Tomcat only"
    rules_egress:
      - proto: all
        cidr_ip: "0.0.0.0/0"
        rule_desc: "Allow all outbound"
    tags:
      Name: "{{ rabbitmq_sg_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: rabbitmq_sg

- name: Debug RabbitMQ security group ID
  debug:
    msg: "RabbitMQ SG created: {{ rabbitmq_sg.group_id }}"

# STORE SECURITY GROUP IDs IN SSM 
- name: Store security group IDs in SSM Parameter Store
  community.aws.ssm_parameter:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    string_type: String
    region: "{{ region }}"
    state: present
    overwrite_value: always
    tags:
      Environment: "{{ env }}"
      ManagedBy: ansible
  loop:
    - { name: "/{{ project }}/{{ env }}/sg/alb_sg_id",       value: "{{ alb_sg.group_id }}" }
    - { name: "/{{ project }}/{{ env }}/sg/nginx_sg_id",     value: "{{ nginx_sg.group_id }}" }
    - { name: "/{{ project }}/{{ env }}/sg/tomcat_sg_id",    value: "{{ tomcat_sg.group_id }}" }
    - { name: "/{{ project }}/{{ env }}/sg/mysql_sg_id",     value: "{{ mysql_sg.group_id }}" }
    - { name: "/{{ project }}/{{ env }}/sg/memcache_sg_id",  value: "{{ memcache_sg.group_id }}" }
    - { name: "/{{ project }}/{{ env }}/sg/rabbitmq_sg_id",  value: "{{ rabbitmq_sg.group_id }}" }
  when: state == "present" # only store in SSM if we actually created/updated the SGs 

- name: Debug - stored SG IDs
  debug: 
    msg:
      - "Security group IDs stored in SSM under /{{ project }}/{{ env }}/sg/"
      - "Example: /{{ project }}/{{ env }}/sg/alb_sg_id = {{ alb_sg.group_id }}"