---
# FETCH IDs FROM SSM 
- name: Fetch ALB SG ID, Nginx instance ID, and public subnet IDs from SSM
  set_fact:
    alb_sg_id: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/sg/alb_sg_id', region='us-east-1') }}"
    nginx_instance_id: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/compute/nginx_id', region='us-east-1') }}"
    public_subnet_ids: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/subnets/public', region='us-east-1').split(',') }}"

- name: Debug fetched IDs
  debug:
    msg:
      - "ALB SG ID: {{ alb_sg_id }}"
      - "Nginx instance ID: {{ nginx_instance_id }}"
      - "Public subnet IDs: {{ public_subnet_ids }}"

# CREATE TARGET GROUP 
- name: Create target group for Nginx and register instance
  community.aws.elb_target_group:
    name: "{{ target_group_name }}"
    protocol: http
    port: "{{ nginx_port }}"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    target_type: instance
    health_check_protocol: http
    health_check_path: /
    health_check_interval: 30
    health_check_timeout: 5
    healthy_threshold_count: 2
    unhealthy_threshold_count: 3
    targets:
      - Id: "{{ nginx_instance_id }}"
        Port: "{{ nginx_port }}"
    tags:
      Name: "{{ target_group_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: target_group

# CREATE APPLICATION LOAD BALANCER 
- name: Update ALB with HTTPS listener and HTTP redirect
  amazon.aws.elb_application_lb:
    name: "{{ alb_name }}"
    region: "{{ region }}"
    subnets: "{{ public_subnet_ids }}"               
    security_groups: ["{{ alb_sg_id }}"] 
    listeners:
      - Protocol: HTTP
        Port: 80
        DefaultActions:
          - Type: redirect # any HTTP traffic to the ALB will be automatically redirected to HTTPS
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301 
      - Protocol: HTTPS 
        Port: 443
        DefaultActions:
          - Type: forward 
            TargetGroupName: "{{ target_group_name }}" # the ALB will forward incoming HTTPS traffic to the Nginx instance
        Certificates:
          - CertificateArn: "arn:aws:acm:us-east-1:039612873733:certificate/ea8f84af-8735-4418-900f-e27af5735db6"
        SslPolicy: "ELBSecurityPolicy-TLS-1-2-Ext-2018-06" 
    state: present
  register: alb

- name: Store ALB DNS name in SSM
  community.aws.ssm_parameter:
    name: "/{{ project }}/{{ env }}/alb/dns_name"
    value: "{{ alb.dns_name }}"
    string_type: String
    region: "{{ region }}"
    state: present
    overwrite_value: always
    tags:
      Environment: "{{ env }}"
      ManagedBy: ansible

- name: Debug SSM storage
  debug:
    msg: "ALB DNS stored in SSM: /{{ project }}/{{ env }}/alb/dns_name = {{ alb.dns_name }}"
