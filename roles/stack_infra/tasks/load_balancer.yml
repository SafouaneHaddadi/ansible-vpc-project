---
# FETCH IDs FROM SSM 
- name: Fetch ALB SG ID, Nginx instance ID, and public subnet IDs from SSM
  set_fact:
    alb_sg_id: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/sg/alb_sg_id', region='us-east-1') }}"
    nginx_instance_id: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/compute/nginx_id', region='us-east-1') }}"
    public_subnet_ids: "{{ lookup('amazon.aws.aws_ssm', '/vprofile/dev/subnets/public', region='us-east-1').split(',') }}"

- name: Debug fetched IDs
  debug:
    msg:
      - "ALB SG ID: {{ alb_sg_id }}"
      - "Nginx instance ID: {{ nginx_instance_id }}"
      - "Public subnet IDs: {{ public_subnet_ids }}"

- name: Wait for Nginx EC2 to be in running state
  amazon.aws.ec2_instance_info:
    instance_ids:
      - "{{ nginx_instance_id }}"
    region: "{{ region }}"
  register: nginx_status
  until: nginx_status.instances[0].state.name == "running" 
  retries: 30
  delay: 10

# CREATE TARGET GROUP 
- name: Create target group for Nginx and register instance
  community.aws.elb_target_group:
    name: "{{ target_group_name }}"
    protocol: http
    port: "{{ nginx_port }}"
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    state: present
    target_type: instance
    health_check_protocol: http
    health_check_path: /
    health_check_interval: 30
    health_check_timeout: 5
    healthy_threshold_count: 2
    unhealthy_threshold_count: 3
    targets:
      - Id: "{{ nginx_instance_id }}"
        Port: "{{ nginx_port }}"
    tags:
      Name: "{{ target_group_name }}"
      Environment: "{{ env }}"
      ManagedBy: ansible
  register: target_group

- name: Debug target group
  debug:
    var: target_group