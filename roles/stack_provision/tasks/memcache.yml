---
- name: Install Memcached
  ansible.builtin.apt:
    name: memcached
    state: present
    update_cache: yes
  become: true

- name: Remove -d daemonize flag from config (incompatible with systemd)
  ansible.builtin.lineinfile:
    path: /etc/memcached.conf
    regexp: '^-d$'
    state: absent
  become: true

- name: Kill any existing memcached process on port 11211
  ansible.builtin.shell: |
    set -o pipefail
    kill -9 $(lsof -t -i :11211) 2>/dev/null || true
  args:
    executable: /bin/bash
  become: true
  changed_when: fals

- name: Start and enable Memcached
  ansible.builtin.service:
    name: memcached
    state: started
    enabled: yes
  become: true

- name: Remove any existing bind-address lines
  ansible.builtin.lineinfile:
    path: /etc/memcached.conf
    regexp: '^-l\s+'
    state: absent
  become: true

- name: Add bind-address to listen on all interfaces
  ansible.builtin.lineinfile:
    path: /etc/memcached.conf
    line: '-l 0.0.0.0'
    insertafter: EOF
  become: true
  notify: restart memcached