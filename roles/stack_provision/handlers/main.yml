---
- name: restart mysql
  ansible.builtin.service:
    name: mysql
    state: restarted
  become: true

- name: restart memcached
  ansible.builtin.service:
    name: memcached
    state: restarted
  become: true

- name: restart rabbitmq
  ansible.builtin.service:
    name: rabbitmq-server
    state: restarted
  become: true

- name: restart tomcat
  ansible.builtin.service:
    name: tomcat
    state: restarted
  become: true