# Hey AWS, tell me what servers exist, group them by role, then connect using SSM and run my tasks

plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: ""

hostnames:
  - instance-id

compose:
  ansible_host: instance_id

vars:
  ansible_connection: amazon.aws.aws_ssm
  ansible_aws_ssm_region: us-east-1
  ansible_aws_ssm_bucket_name: vprofile-ansible-ssm-transfers