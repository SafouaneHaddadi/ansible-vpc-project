# Hey AWS, tell me what servers exist, group them by role, then connect using SSM and run my tasks

plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: ""

hostnames:
  - private-ip-address

compose:
  ansible_host: private_ip_address

vars:
  ansible_connection: community.aws.aws_ssm
  ansible_aws_ssm_region: us-east-1